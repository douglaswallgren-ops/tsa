<!DOCTYPE html>
<!-- TSA Tech Bowl Study Tool v1.0.0 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSA Tech Bowl — Study Tool v1.0.0</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0a1520;
    --border: #0e2a40;
    --accent: #00d4ff;
    --accent2: #00ff99;
    --accent3: #ff6b35;
    --text: #cce8f4;
    --muted: #4a7a99;
    --correct: #00ff99;
    --wrong: #ff3d6e;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
    --cond: 'Barlow Condensed', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .app {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo-block h1 {
    font-family: var(--cond);
    font-size: 2.6rem;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,212,255,0.4);
  }
  .logo-block p {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-top: 4px;
  }
  .countdown { text-align: right; font-family: var(--mono); }
  .countdown .days { font-size: 2rem; color: var(--accent3); font-weight: 700; }
  .countdown .label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .score-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-chip span { color: var(--accent); font-size: 1rem; font-weight: 700; }
  .stat-chip.green span { color: var(--correct); }
  .stat-chip.red span { color: var(--wrong); }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s ease; width: 0%; }
  .section-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
  }
  .cat-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .cat-btn:hover { border-color: var(--accent); background: rgba(0,212,255,0.05); }
  .cat-btn.active { border-color: var(--accent); background: rgba(0,212,255,0.1); box-shadow: 0 0 12px rgba(0,212,255,0.15); }
  .cat-icon { font-size: 1.1rem; margin-bottom: 4px; }
  .cat-name { font-family: var(--cond); font-size: 0.82rem; font-weight: 700; letter-spacing: 0.03em; color: var(--text); text-transform: uppercase; }
  .cat-count { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
  .cat-btn.active .cat-name { color: var(--accent); }

  .mode-row { display: flex; gap: 8px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
  .mode-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }
  .mode-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .mode-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,153,0.07); }

  .go-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: var(--cond);
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .go-btn:hover:not(:disabled) { background: #33ddff; transform: translateY(-1px); }
  .go-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .q-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }
  .q-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); }
  .q-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 8px; flex-wrap: wrap; }
  .q-cat-tag {
    font-family: var(--mono); font-size: 0.63rem; letter-spacing: 0.1em; color: var(--accent);
    text-transform: uppercase; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
    padding: 3px 8px; border-radius: 2px;
  }
  .q-num { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
  .q-text { font-size: 1.12rem; font-weight: 400; line-height: 1.6; color: #e8f4ff; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 0.93rem;
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.45;
    width: 100%;
  }
  .opt-btn:not(:disabled):hover { border-color: var(--accent); background: rgba(0,212,255,0.06); }
  .opt-letter {
    font-family: var(--mono); font-size: 0.72rem; color: var(--muted); background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 2px; min-width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
  }
  .opt-btn.correct { border-color: var(--correct); background: rgba(0,255,153,0.08); }
  .opt-btn.correct .opt-letter { background: var(--correct); color: var(--bg); border-color: var(--correct); font-weight: 700; }
  .opt-btn.wrong { border-color: var(--wrong); background: rgba(255,61,110,0.08); }
  .opt-btn.wrong .opt-letter { background: var(--wrong); color: white; border-color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }
  .explanation {
    margin-top: 16px; padding: 14px 16px; background: rgba(0,212,255,0.04);
    border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0;
    font-size: 0.88rem; line-height: 1.65; color: var(--text); animation: fadeIn 0.3s ease;
  }
  .explanation strong {
    color: var(--accent); font-family: var(--mono); font-size: 0.68rem;
    letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 7px;
  }
  .next-btn {
    width: 100%; padding: 13px; background: transparent; border: 1px solid var(--accent);
    color: var(--accent); border-radius: 4px; font-family: var(--cond); font-size: 1rem;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    transition: all 0.15s; margin-top: 12px;
  }
  .next-btn:hover { background: rgba(0,212,255,0.08); }
  .history-section { margin-top: 32px; }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 14px; display: flex; align-items: center; gap: 10px; font-size: 0.83rem;
    animation: fadeIn 0.2s ease;
  }
  .history-icon { font-size: 0.9rem; flex-shrink: 0; }
  .history-q { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-cat { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); flex-shrink: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .q-src-badge {
    font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.08em;
    padding: 2px 7px; border-radius: 2px; text-transform: uppercase;
  }
  .q-src-badge.online  { color: var(--accent2); border: 1px solid rgba(0,255,153,0.25); background: rgba(0,255,153,0.06); }
  .q-src-badge.local   { color: var(--muted);   border: 1px solid var(--border);        background: transparent; }

  /* ─── Safari / cross-browser base fixes ──────────────────────────────────── */
  html { -webkit-text-size-adjust: 100%; }
  body { -webkit-font-smoothing: antialiased; }
  button {
    -webkit-appearance: none;
    touch-action: manipulation;   /* removes 300 ms tap delay in Safari */
  }

  /* ─── Suppress sticky-hover on touch devices ─────────────────────────────── */
  @media (hover: none) {
    .cat-btn:hover               { border-color: var(--border); background: var(--panel); }
    .opt-btn:not(:disabled):hover{ border-color: var(--border); background: rgba(255,255,255,0.02); }
    .go-btn:hover:not(:disabled) { background: var(--accent); transform: none; }
    .next-btn:hover              { background: transparent; }
    .mode-btn:hover              { border-color: var(--border); color: var(--muted); }
  }

  /* ─── Mobile layout (≤ 600 px) ───────────────────────────────────────────── */
  @media (max-width: 600px) {
    .app { padding: 14px 14px 48px; }

    /* Header */
    .logo-block h1 { font-size: 1.85rem; }
    header { margin-bottom: 20px; }

    /* Stats strip — tighter chips, allow two rows */
    .score-bar { gap: 6px; }
    .stat-chip  { padding: 6px 10px; font-size: 0.63rem; }
    .stat-chip span { font-size: 0.9rem; }

    /* Category grid — 2 fixed columns on phones */
    .cat-grid { grid-template-columns: repeat(2, 1fr); }

    /* Mode buttons — taller tap target */
    .mode-btn { padding: 10px 14px; font-size: 0.68rem; }

    /* Question card */
    .q-card    { padding: 16px 14px; }
    .q-text    { font-size: 1rem; }
    .opt-btn   { padding: 13px 14px; font-size: 0.9rem; }

    /* History — let text wrap instead of overflowing */
    .history-q { white-space: normal; }
  }

  /* ─── Extra-small phones (≤ 380 px) ─────────────────────────────────────── */
  @media (max-width: 380px) {
    .logo-block h1 { font-size: 1.5rem; }
    .countdown .days { font-size: 1.6rem; }
    .cat-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .mode-row { flex-direction: column; align-items: flex-start; }
    .mode-btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-block">
      <h1>TSA Tech Bowl</h1>
      <p>// STUDY TERMINAL — STATE COMPETITION PREP &nbsp;·&nbsp; v1.0.0</p>
    </div>
    <div class="countdown">
      <div class="days" id="days-left">—</div>
      <div class="label">days until<br>competition</div>
    </div>
  </header>

  <div class="score-bar">
    <div class="stat-chip">SESSION <span id="q-count">0</span></div>
    <div class="stat-chip green">CORRECT <span id="correct-count">0</span></div>
    <div class="stat-chip red">WRONG <span id="wrong-count">0</span></div>
    <div class="stat-chip">STREAK <span id="streak-count">0</span> 🔥</div>
    <div class="stat-chip">ACCURACY <span id="accuracy">—</span></div>
    <div class="stat-chip" id="source-chip" title="Checking connectivity...">SOURCE <span id="source-status" style="color:var(--muted)">···</span></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

  <div class="section-label">Select Topic Area</div>
  <div class="cat-grid" id="cat-grid"></div>

  <div class="mode-row">
    <span class="mode-label">MODE:</span>
    <button class="mode-btn active" id="mode-single" onclick="setMode('single')">SINGLE CATEGORY</button>
    <button class="mode-btn" id="mode-all" onclick="setMode('all')">ALL CATEGORIES (MIXED)</button>
  </div>

  <button class="go-btn" id="go-btn" onclick="nextQuestion()">
    <span>⚡</span> GENERATE QUESTION
  </button>

  <div id="question-area"></div>

  <div class="history-section" id="history-section" style="display:none">
    <div class="section-label">Recent Questions</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script>
// ─── Online source: Open Trivia Database ────────────────────────────────────
// Maps each local category to the closest OpenTDB category ID.
// https://opentdb.com/api_category.php
const ONLINE_CAT_MAP = {
  computing:     18,  // Science: Computers
  programming:   18,
  math:          19,  // Science: Mathematics
  history:       18,  // Science: Computers (closest for tech history)
  electronics:   18,
  engineering:   17,  // Science & Nature
  biotech:       17,
  aerospace:     17,
  energy:        17,
  materials:     17,
  cybersecurity: 18,
  robotics:      18,
};

// ─── State ────────────────────────────────────────────────────────────────────
let isOnline     = false;   // true once connectivity confirmed
let isFetching   = false;   // guard against double-clicks during async load
let onlineCache  = {};      // catId → [{q,opts,a,exp,source:'online'}, ...]
let connectivityCheckTimer = null;

// ─── HTML entity decoder (OpenTDB encodes &amp; &#039; etc.) ────────────────
function htmlDecode(str) {
  const ta = document.createElement('textarea');
  ta.innerHTML = str;
  return ta.value;
}

// ─── Convert one OpenTDB result object to our internal format ────────────────
function convertOtdbQuestion(item) {
  // Build [correct, wrong1, wrong2, wrong3] then shuffle
  const raw = [item.correct_answer, ...item.incorrect_answers];
  const opts = raw.map(htmlDecode);
  const correctDecoded = htmlDecode(item.correct_answer);
  // Fisher-Yates shuffle
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return {
    q:      htmlDecode(item.question),
    opts,
    a:      opts.indexOf(correctDecoded),
    exp:    `Open Trivia Database · ${item.category} · difficulty: ${item.difficulty}`,
    source: 'online',
  };
}

// ─── Fetch a batch of questions from OpenTDB for a given category ─────────────
async function fetchOnlineQuestions(catId) {
  const otdbCat = ONLINE_CAT_MAP[catId] || 18;
  const url = `https://opentdb.com/api.php?amount=15&type=multiple&category=${otdbCat}&difficulty=medium`;
  const controller = new AbortController();
  const timeout    = setTimeout(() => controller.abort(), 6000);
  try {
    const resp = await fetch(url, { signal: controller.signal });
    const data = await resp.json();
    if (data.response_code === 0 && Array.isArray(data.results)) {
      return data.results.map(convertOtdbQuestion);
    }
  } catch (_) {
    /* network error or timeout — caller handles null return */
  } finally {
    clearTimeout(timeout);
  }
  return [];
}

// ─── Pull one question from the online cache (fetch more if empty) ───────────
async function pickOnlineQuestion(catId) {
  if (!onlineCache[catId] || onlineCache[catId].length === 0) {
    const batch = await fetchOnlineQuestions(catId);
    if (!batch.length) return null;          // couldn't reach API
    onlineCache[catId] = batch;
  }
  return onlineCache[catId].shift();
}

// ─── Check connectivity and update the SOURCE chip ───────────────────────────
async function checkConnectivity() {
  updateSourceChip('checking');
  const controller = new AbortController();
  const timeout    = setTimeout(() => controller.abort(), 5000);
  try {
    const resp = await fetch(
      'https://opentdb.com/api.php?amount=1&type=multiple&category=18',
      { signal: controller.signal }
    );
    const data = await resp.json();
    isOnline = (data.response_code === 0);
  } catch (_) {
    isOnline = false;
  } finally {
    clearTimeout(timeout);
  }
  updateSourceChip(isOnline ? 'online' : 'offline');
  // Re-check every 60 s so the tool adapts if connection drops or recovers
  clearTimeout(connectivityCheckTimer);
  connectivityCheckTimer = setTimeout(checkConnectivity, 60000);
}

function updateSourceChip(state) {
  const span = document.getElementById('source-status');
  const chip = document.getElementById('source-chip');
  if (state === 'online') {
    span.textContent = '🌐 LIVE';
    span.style.color = 'var(--accent2)';
    chip.title = 'Online: pulling fresh questions from Open Trivia Database + local bank';
  } else if (state === 'offline') {
    span.textContent = '📴 LOCAL';
    span.style.color = 'var(--muted)';
    chip.title = 'Offline: using built-in question bank only';
  } else {
    span.textContent = '···';
    span.style.color = 'var(--muted)';
    chip.title = 'Checking connectivity…';
  }
}

// ─── Local question bank ─────────────────────────────────────────────────────
const QUESTION_BANK = {
  computing: [
    { q: "What does 'HTTP' stand for?", opts: ["HyperText Transfer Protocol","High-Traffic Transfer Program","Hyperlink Text Transfer Process","Host Terminal Transfer Protocol"], a: 0, exp: "HTTP (HyperText Transfer Protocol) is the foundation of data communication on the World Wide Web, defining how messages are formatted and transmitted between browsers and servers." },
    { q: "Which data structure operates on a Last-In, First-Out (LIFO) principle?", opts: ["Queue","Stack","Linked List","Binary Tree"], a: 1, exp: "A stack uses LIFO — the last element pushed onto the stack is the first one popped off. Think of a stack of plates. Queues use FIFO (First-In, First-Out)." },
    { q: "In binary, what is the decimal value of 11010110?", opts: ["198","214","182","210"], a: 1, exp: "11010110 = 128+64+0+16+0+4+2+0 = 214. Convert each '1' bit to its power of 2: positions 7,6,4,2,1 = 128+64+16+4+2 = 214." },
    { q: "Which OSI model layer is responsible for routing packets between networks?", opts: ["Data Link Layer","Transport Layer","Network Layer","Session Layer"], a: 2, exp: "The Network Layer (Layer 3) handles logical addressing and routing. The Internet Protocol (IP) operates at this layer, determining how packets travel across interconnected networks." },
    { q: "What type of memory loses its data when power is removed?", opts: ["ROM","Flash Storage","SSD","RAM"], a: 3, exp: "RAM (Random Access Memory) is volatile — it requires constant power to maintain stored data. ROM, Flash, and SSD are non-volatile and retain data without power." },
    { q: "What does 'DNS' stand for?", opts: ["Data Network System","Domain Name System","Digital Node Server","Distributed Name Service"], a: 1, exp: "DNS (Domain Name System) is the internet's 'phone book.' It translates human-readable domain names (like google.com) into machine-readable IP addresses." },
    { q: "Which sorting algorithm has an average-case time complexity of O(n log n)?", opts: ["Bubble Sort","Insertion Sort","Merge Sort","Selection Sort"], a: 2, exp: "Merge Sort consistently achieves O(n log n) by recursively dividing the array in half and merging sorted halves. Bubble, Insertion, and Selection sort average O(n²)." },
    { q: "What is the primary purpose of a firewall?", opts: ["Speed up internet connections","Monitor and control incoming and outgoing network traffic based on security rules","Compress data for faster transmission","Store backup copies of data"], a: 1, exp: "A firewall monitors and filters network traffic based on predefined security rules, acting as a barrier between trusted internal networks and untrusted external networks." },
    { q: "In hexadecimal, what is the decimal equivalent of 0xFF?", opts: ["155","245","255","265"], a: 2, exp: "0xFF = (15 × 16) + (15 × 1) = 240 + 15 = 255. F in hex = 15 in decimal. FF is the maximum value of a single byte." },
    { q: "What is 'Moore's Law'?", opts: ["Network bandwidth doubles every year","The number of transistors on a chip doubles approximately every two years","Software complexity doubles every 18 months","Storage costs halve every three years"], a: 1, exp: "Moore's Law, observed by Gordon Moore in 1965, states that the number of transistors on integrated circuits doubles roughly every two years, driving exponential growth in computing power." },
    { q: "Which protocol is used to securely transfer files over a network?", opts: ["FTP","SFTP","HTTP","SMTP"], a: 1, exp: "SFTP (Secure File Transfer Protocol) encrypts both commands and data, preventing passwords and sensitive information from being transmitted in cleartext. FTP sends data unencrypted." },
    { q: "What is the function of CPU cache memory?", opts: ["Store deleted files temporarily","Hold frequently accessed data close to the processor to reduce access latency","Manage virtual memory pages","Back up RAM contents to disk"], a: 1, exp: "CPU cache is small, ultra-fast memory on or near the processor that stores copies of frequently accessed data, dramatically reducing the latency compared to accessing main RAM." },
    { q: "What does BIOS stand for?", opts: ["Basic Input/Output System","Binary Integrated Operating Software","Boot Initialization Output Standard","Base Internal Operating System"], a: 0, exp: "BIOS (Basic Input/Output System) is firmware stored on a chip on the motherboard. It initializes hardware during the boot process before handing control to the operating system." },
    { q: "What is the difference between IPv4 and IPv6?", opts: ["IPv6 is slower but more secure","IPv4 uses 32-bit addresses (4.3 billion); IPv6 uses 128-bit addresses (340 undecillion)","IPv4 is the newer standard","They are interchangeable"], a: 1, exp: "IPv4 uses 32-bit addresses (~4.3 billion unique addresses), which are nearly exhausted. IPv6 uses 128-bit addresses, providing 340 undecillion addresses to support the growing internet." },
  ],
  programming: [
    { q: "What is the output type of 3/2 in Python 3?", opts: ["int","float","double","fraction"], a: 1, exp: "In Python 3, '/' always performs true division and returns a float. 3/2 = 1.5 (float). Use '//' for integer (floor) division: 3//2 = 1 (int)." },
    { q: "In OOP, what is 'encapsulation'?", opts: ["Creating multiple instances of a class","Bundling data and methods within a single unit and restricting direct access to internal components","Inheriting properties from a parent class","Defining multiple methods with the same name"], a: 1, exp: "Encapsulation bundles data (attributes) and methods that operate on that data into a single class, hiding internal implementation details and protecting data from unintended access." },
    { q: "What is the difference between '=' and '==' in most programming languages?", opts: ["They are interchangeable","'=' assigns a value to a variable; '==' tests whether two values are equal","'==' assigns; '=' compares","'==' only works with numbers"], a: 1, exp: "'=' is the assignment operator: x = 5 stores 5 in x. '==' is the equality comparison: x == 5 checks if x holds the value 5 and returns true or false. Confusing them is one of the most common beginner bugs." },
    { q: "What is the time complexity of binary search?", opts: ["O(n)","O(n²)","O(log n)","O(n log n)"], a: 2, exp: "Binary search halves the search space with each comparison on a sorted array, giving O(log n) time complexity — far more efficient than linear search O(n) for large datasets." },
    { q: "Which is NOT a valid variable name in most programming languages?", opts: ["my_variable","_temp","2ndValue","camelCase"], a: 2, exp: "Variable names cannot begin with a digit in most languages (Python, Java, C, JavaScript). Identifiers must start with a letter or underscore. '2ndValue' is invalid." },
    { q: "What Python data structure stores key-value pairs?", opts: ["List","Tuple","Set","Dictionary"], a: 3, exp: "Python dictionaries store key-value pairs with O(1) average lookup time. Insertion-ordered since Python 3.7, they are one of Python's most powerful built-in data structures." },
    { q: "What does recursion involve in programming?", opts: ["Repeating code using for loops","A function calling itself with a modified argument to solve a sub-problem","Using multiple threads simultaneously","Storing data in a stack structure"], a: 1, exp: "Recursion is when a function calls itself with a modified argument, breaking a problem into smaller identical subproblems. It requires a base case to stop the recursion." },
    { q: "What does a version control system like Git primarily enable?", opts: ["Automatically fixing bugs","Tracking code changes, collaboration, and reverting to previous versions","Compiling code faster","Deploying to cloud servers"], a: 1, exp: "Version control systems track the complete history of all code changes, enable multiple developers to collaborate without conflicts, and allow reverting to any previous state of the codebase." },
    { q: "What does HTML stand for?", opts: ["HyperText Markup Language","High Transfer Markup Language","Home Tool Management Language","HyperLink Text Method Language"], a: 0, exp: "HTML (HyperText Markup Language) is the standard markup language for creating web pages. It describes web content structure using elements represented by tags like <p>, <div>, <h1>." },
    { q: "In SQL, what does a JOIN operation do?", opts: ["Deletes duplicate rows","Combines rows from two or more tables based on a related column","Creates a new table","Sorts data in ascending order"], a: 1, exp: "JOIN combines records from multiple tables based on matching values in related columns. Types include INNER JOIN (matching rows only), LEFT JOIN, RIGHT JOIN, and FULL JOIN." },
    { q: "What is an API (Application Programming Interface)?", opts: ["A type of computer processor","A set of rules and tools that lets different software applications communicate with each other","A programming language","A type of database"], a: 1, exp: "An API defines how software components interact. When you use an app that shows weather data, it's calling a weather API. APIs let developers use features of another service without knowing its internal code." },
    { q: "What is the purpose of the 'try-catch' block?", opts: ["To speed up code execution","To handle exceptions (runtime errors) gracefully without crashing the program","To declare variables","To iterate over collections"], a: 1, exp: "Try-catch blocks handle runtime exceptions. Code that might throw an error goes in 'try'; the 'catch' block executes if an exception is thrown, preventing an unhandled crash." },
  ],
  engineering: [
    { q: "What is 'tensile strength'?", opts: ["Resistance to compression","The maximum stress a material can withstand while being stretched before breaking","A measure of hardness","The ability to return to original shape after deformation"], a: 1, exp: "Tensile strength (ultimate tensile strength) is the maximum stress a material withstands while being pulled/stretched. Measured in pascals (Pa) or pounds per square inch (psi)." },
    { q: "What is the purpose of a feedback loop in an engineering system?", opts: ["To increase the speed of a machine","To use the system's output to automatically adjust its own input and maintain a desired result","To reduce the number of components needed","To convert electrical energy to mechanical energy"], a: 1, exp: "A feedback loop measures a system's output and feeds that information back to adjust the input. A thermostat is a classic example: it reads room temperature (output) and switches heating on/off (input) to reach the target." },
    { q: "Which type of stress occurs when forces act parallel to a cross-section?", opts: ["Compressive stress","Tensile stress","Shear stress","Bending stress"], a: 2, exp: "Shear stress occurs when forces act parallel (tangential) to a cross-sectional area, causing layers to slide relative to each other — like scissors cutting paper or bolts being sheared." },
    { q: "What does 'factor of safety' mean in structural engineering?", opts: ["The percentage of a structure that can fail","The ratio of ultimate structural strength to the actual applied load","The cost margin in projects","The number of redundant systems"], a: 1, exp: "Factor of Safety (FoS) = Ultimate Strength / Working Load. It accounts for uncertainties in material properties and loads. FoS = 2 means the structure could handle twice the design load before failure." },
    { q: "What does Bernoulli's principle state?", opts: ["Pressure and velocity are directly proportional","As fluid velocity increases, pressure decreases (for steady, inviscid flow)","Temperature and pressure are inversely related","Viscosity increases with flow rate"], a: 1, exp: "Bernoulli's principle: for inviscid, steady flow, increased fluid speed corresponds to decreased pressure. It explains lift in airplane wings and the Venturi effect in carburetors." },
    { q: "What distinguishes AC from DC electrical current?", opts: ["AC is always stronger than DC","DC changes direction periodically; AC flows in one direction","AC periodically reverses direction; DC flows in one constant direction","They are identical at high voltages"], a: 2, exp: "AC (Alternating Current) periodically reverses direction (60 Hz in the US). DC (Direct Current) flows in one constant direction. AC dominates power grids because transformers can change voltage levels easily." },
    { q: "Why are triangles used in truss bridge construction?", opts: ["They look aesthetically pleasing","Triangles are the only rigid polygon — they distribute loads as pure tension/compression without deforming","They use less material than other shapes","They allow for easy assembly"], a: 1, exp: "Triangles are rigid — they cannot change shape without altering a side length. This makes trusses extremely stiff. Members carry only axial forces (tension or compression), not bending." },
    { q: "What is 'tolerance' in manufacturing engineering?", opts: ["A material's ability to withstand heat","The permissible range of variation in a dimension or measurement","The minimum strength required","The time allowed to manufacture something"], a: 1, exp: "Tolerance defines the acceptable dimensional variation (e.g., 10mm ± 0.05mm). Tighter tolerances require more precise processes but increase cost. GD&T is the system for specifying tolerances." },
  ],
  electronics: [
    { q: "Using Ohm's Law, if R = 10Ω and I = 2A, what is the voltage?", opts: ["5 V","12 V","20 V","0.2 V"], a: 2, exp: "V = IR = 2A × 10Ω = 20 volts. Ohm's Law (V=IR) and its rearrangements (I=V/R, R=V/I) are foundational to circuit analysis." },
    { q: "What does a capacitor store energy in?", opts: ["A magnetic field","A chemical reaction","An electric field between two conductive plates","Mechanical compression"], a: 2, exp: "Capacitors store energy in an electric field between two conductive plates separated by a dielectric (insulating material). Energy = ½CV². Used in filtering, timing, and energy storage." },
    { q: "What does a diode do?", opts: ["Amplify current","Allow current to flow in only one direction","Block all current","Increase resistance"], a: 1, exp: "A diode permits current to flow easily in one direction (forward biased, ~0.7V drop for silicon) while blocking it in the other direction (reverse biased). Essential for rectifiers and protection circuits." },
    { q: "What is the output of an AND gate with inputs 1 and 0?", opts: ["1","0","High-Z","Depends on voltage level"], a: 1, exp: "AND gate output is 1 ONLY when ALL inputs are 1. With inputs 1 and 0, output = 0. Truth table: 00→0, 01→0, 10→0, 11→1." },
    { q: "What is the SI unit of electrical resistance?", opts: ["Farad","Henry","Ohm","Siemens"], a: 2, exp: "Resistance is measured in Ohms (Ω), named after Georg Simon Ohm. Farads (F) measure capacitance, Henries (H) measure inductance, and Siemens (S) measure conductance (1/Ω)." },
    { q: "What happens to total resistance with resistors in parallel?", opts: ["Total resistance increases","Total resistance equals the sum","Total resistance decreases below the smallest individual value","Total equals the largest resistor"], a: 2, exp: "Parallel resistance formula: 1/Rtotal = 1/R1 + 1/R2 + ... The result is always less than the smallest resistor because parallel paths provide multiple routes for current." },
    { q: "What is the primary function of a transistor?", opts: ["Store electrical charge","Convert AC to DC","Amplify or switch electronic signals","Measure voltage"], a: 2, exp: "Transistors act as amplifiers (analog) or switches (digital). They are the fundamental building block of modern electronics — billions are integrated into every modern microchip." },
    { q: "What does PWM stand for and what is it used for?", opts: ["Power Wire Management","Pulse Width Modulation — controlling power to devices by varying duty cycle","Programmable Wave Mode","Parallel Wire Multiplexing"], a: 1, exp: "Pulse Width Modulation rapidly switches a signal on/off. By varying the duty cycle (% time ON), average power to a device is controlled — used in motor speed, LED dimming, and audio amplifiers." },
    { q: "What is an integrated circuit (IC)?", opts: ["A circuit made of discrete components on a breadboard","Multiple electronic components miniaturized onto a single semiconductor chip","A circuit that integrates AC and DC power","A circuit board with no solder connections"], a: 1, exp: "An IC (chip) contains millions to billions of transistors, resistors, capacitors, and diodes fabricated on a single piece of silicon. They are the foundation of all modern electronics." },
  ],
  biotech: [
    { q: "What does PCR (Polymerase Chain Reaction) accomplish?", opts: ["Separate proteins by size","Amplify specific DNA sequences exponentially","Sequence entire genomes","Synthesize proteins from mRNA"], a: 1, exp: "PCR amplifies specific DNA sequences by thermally cycling through denaturation, annealing, and extension. A single DNA fragment can be copied billions of times — enabling diagnostics, forensics, and research." },
    { q: "What is CRISPR-Cas9 used for?", opts: ["Protein synthesis","Precise gene editing — cutting specific DNA sequences to delete, repair, or insert genes","Cloning entire organisms","Manufacturing antibodies"], a: 1, exp: "CRISPR-Cas9 uses guide RNA to direct the Cas9 enzyme to cut a specific DNA sequence with precision, enabling gene editing. It has revolutionized genetic medicine and biological research." },
    { q: "What is the correct order of the central dogma of molecular biology?", opts: ["DNA → RNA → Protein","RNA → DNA → Protein","Protein → RNA → DNA","DNA → Protein → RNA"], a: 0, exp: "The central dogma: DNA is transcribed into mRNA, which is translated into protein. Reverse transcriptase allows RNA→DNA (retroviruses), but the standard flow is DNA→RNA→Protein." },
    { q: "What does gel electrophoresis separate molecules by?", opts: ["Molecular weight only","Charge only","Size, using an electric field to migrate charged molecules through a gel matrix","Color under UV light"], a: 2, exp: "Gel electrophoresis uses electric current to move charged molecules (DNA, RNA, proteins) through a gel. Smaller molecules migrate faster, separating the mixture by size. Used in DNA fingerprinting." },
    { q: "What is a bioreactor?", opts: ["A nuclear reactor using biological fuel","A controlled vessel supporting biological processes to produce pharmaceuticals, biofuels, or enzymes","A machine that sequences DNA","A device measuring metabolic rate"], a: 1, exp: "Bioreactors provide optimal, controlled conditions (temperature, pH, aeration, agitation) for cultivating microorganisms or cells at industrial scale to produce antibiotics, vaccines, biofuels, and enzymes." },
    { q: "What two properties define stem cells?", opts: ["Being embryonic and undifferentiated","Self-renewal (dividing indefinitely) and potency (differentiating into specialized cells)","Found exclusively in bone marrow","Having the largest nuclei of any human cell"], a: 1, exp: "Stem cells are characterized by: (1) self-renewal — the ability to divide and create more stem cells, and (2) potency — the ability to differentiate into specialized cell types. This makes them valuable for regenerative medicine." },
  ],
  aerospace: [
    { q: "What are the four aerodynamic forces acting on an aircraft?", opts: ["Push, Pull, Rise, Fall","Lift, Weight, Thrust, Drag","Speed, Gravity, Power, Friction","Pressure, Buoyancy, Force, Momentum"], a: 1, exp: "The four forces: Lift (upward, generated by wings), Weight/Gravity (downward), Thrust (forward, from propulsion), Drag (rearward, opposing motion). Straight/level flight requires Lift = Weight and Thrust = Drag." },
    { q: "What does Mach 1 represent?", opts: ["1,000 km/h at any altitude","The speed of sound in the surrounding medium (~343 m/s at sea level, 20°C)","100,000 feet altitude","Escape velocity from Earth's atmosphere"], a: 1, exp: "Mach number = object speed / local speed of sound. Mach 1 ≈ 343 m/s (767 mph) at sea level, 20°C. The speed of sound decreases with altitude as temperature drops." },
    { q: "What is the Kármán line?", opts: ["The boundary between troposphere and stratosphere at ~12 km","The internationally recognized boundary of space at 100 km altitude","The altitude where jet engines cease to function","The zero-gravity line around Earth"], a: 1, exp: "The Kármán line at 100 km (62 miles) is the internationally recognized boundary of outer space, where atmospheric aerodynamics become negligible and orbital mechanics dominate flight." },
    { q: "What does specific impulse (Isp) measure in rocketry?", opts: ["Total thrust of a rocket","Fuel efficiency — thrust produced per unit weight of propellant consumed per second (measured in seconds)","Maximum altitude achievable","Structural hull strength"], a: 1, exp: "Specific impulse (seconds) is rocketry's equivalent of fuel efficiency. Higher Isp means more thrust per unit of propellant burned. Liquid hydrogen/oxygen engines achieve ~450s; solid rockets ~280s." },
    { q: "What causes a sonic boom?", opts: ["Engines suddenly increasing thrust","Pressure waves piling up into a shockwave that cannot outrun the supersonic aircraft","Wings vibrating at resonance frequency","Air molecules igniting from friction"], a: 1, exp: "At supersonic speeds, an aircraft outruns its own pressure waves, which pile up into a continuous shockwave extending behind it. When this shockwave reaches the ground, observers hear the sonic boom." },
    { q: "What is the primary difference between a satellite's LEO and GEO orbits?", opts: ["LEO satellites are larger","GEO satellites orbit at ~35,786 km appearing stationary; LEO satellites orbit at 200-2000 km with shorter periods","LEO orbits are used for communication only","GEO satellites move faster than LEO satellites"], a: 1, exp: "GEO (Geostationary Earth Orbit) at ~35,786 km matches Earth's rotation, keeping satellites stationary over one point — ideal for TV/weather. LEO (200-2000 km) has shorter periods (~90 min) and lower latency, used for ISS and Starlink." },
  ],
  math: [
    { q: "What is the slope of the line passing through the points (2, 3) and (6, 11)?", opts: ["2","4","3","8"], a: 0, exp: "Slope = (y₂ − y₁) / (x₂ − x₁) = (11 − 3) / (6 − 2) = 8 / 4 = 2. Slope measures steepness: rise over run. A positive slope means the line goes upward from left to right." },
    { q: "What is the sum of interior angles of a polygon with n sides?", opts: ["180n degrees","(n − 2) × 180 degrees","360 degrees always","90n degrees"], a: 1, exp: "(n−2) × 180°. Triangle (n=3): 180°. Quadrilateral (n=4): 360°. Pentagon (n=5): 540°. Each additional side adds another 180° to the total interior angle sum." },
    { q: "What does standard deviation measure in statistics?", opts: ["The middle value in a dataset","The average value","The spread or dispersion of data points around the mean","The range between highest and lowest values"], a: 2, exp: "Standard deviation (σ) measures how spread out data is from the mean. Low σ = data clusters near mean; high σ = data is widely dispersed. σ² = variance. Used extensively in quality control and science." },
    { q: "What is the value of x if 2ˣ = 64?", opts: ["5","6","7","8"], a: 1, exp: "2¹=2, 2²=4, 2³=8, 2⁴=16, 2⁵=32, 2⁶=64. So x = 6. Exponential equations like this appear everywhere in computer science — a 6-bit number can represent 2⁶ = 64 distinct values." },
    { q: "What is the probability of rolling a sum of 7 with two standard dice?", opts: ["1/6","5/36","6/36 = 1/6","7/36"], a: 2, exp: "36 total outcomes. Pairs summing to 7: (1,6)(2,5)(3,4)(4,3)(5,2)(6,1) = 6 combinations. P = 6/36 = 1/6. Seven is the most probable outcome with two dice." },
    { q: "For a right triangle with legs a=3 and b=4, what is the hypotenuse?", opts: ["5","6","7","√7"], a: 0, exp: "Pythagorean Theorem: c² = a² + b² = 9 + 16 = 25, so c = 5. The 3-4-5 right triangle is the most famous Pythagorean triple." },
    { q: "What is log₂(64)?", opts: ["4","6","8","32"], a: 1, exp: "log₂(64) asks: '2 to what power equals 64?' 2¹=2, 2²=4, 2³=8, 2⁴=16, 2⁵=32, 2⁶=64. Answer: 6. Binary logarithms appear throughout computer science." },
  ],
  energy: [
    { q: "What is the primary greenhouse gas from human activities?", opts: ["Oxygen","Nitrogen","Carbon Dioxide (CO₂)","Hydrogen"], a: 2, exp: "CO₂ is the primary anthropogenic greenhouse gas, released mainly by burning fossil fuels and deforestation. It absorbs and re-emits infrared radiation, warming the atmosphere." },
    { q: "What distinguishes renewable from non-renewable energy?", opts: ["Renewables are always more expensive","Renewables replenish naturally on human timescales; non-renewables took millions of years to form","Renewables always require more land","Non-renewables are newer technologies"], a: 1, exp: "Renewable sources (solar, wind, hydro, geothermal) naturally replenish. Non-renewables (coal, oil, natural gas, uranium for fission) formed over millions of years and permanently deplete when used." },
    { q: "How do photovoltaic (PV) solar panels generate electricity?", opts: ["By heating water to drive turbines","By converting photons directly into electricity via the photovoltaic effect in semiconductor materials","By concentrating sunlight to heat a fluid","By chemical reactions between sunlight and metals"], a: 1, exp: "The photovoltaic effect: photons from sunlight knock electrons loose in semiconductor materials (typically silicon p-n junctions), creating an electric current directly — no moving parts, no heat required." },
    { q: "What energy process powers nuclear fission plants?", opts: ["Fusion of hydrogen atoms","Splitting heavy atomic nuclei (Uranium-235) with neutrons, releasing energy and more neutrons","Burning enriched coal","High-temperature chemical oxidation"], a: 1, exp: "Nuclear fission splits U-235 or Pu-239 nuclei when struck by neutrons, releasing enormous energy (E=mc²) plus neutrons that split more nuclei — a self-sustaining chain reaction heating water to drive turbines." },
    { q: "What is 'energy efficiency'?", opts: ["Using the cheapest energy source","The ratio of useful energy output to total energy input, expressed as a percentage","Generating energy without byproducts","The maximum energy a system can store"], a: 1, exp: "Energy efficiency = (useful output energy / total input energy) × 100%. The second law of thermodynamics means no system achieves 100% — some energy always degrades to unusable heat." },
    { q: "What is 'net metering' in the context of solar energy?", opts: ["A meter that measures only net solar radiation","A billing arrangement where excess electricity fed back to the grid offsets the consumer's bill","A method of measuring panel efficiency","The net cost of solar installation after subsidies"], a: 1, exp: "Net metering allows solar panel owners to send excess electricity to the utility grid and receive credits on their electricity bill, effectively running the meter backward and reducing or eliminating electric bills." },
  ],
  materials: [
    { q: "What distinguishes a metal from a polymer at the atomic scale?", opts: ["Metals have larger atoms","Metals have a crystalline lattice with delocalized electrons; polymers are long carbon-based molecular chains","Polymers conduct electricity better","Metals are always transparent to X-rays"], a: 1, exp: "Metals: crystalline structure with a 'sea' of delocalized electrons (explaining conductivity and luster). Polymers: long chains of repeating monomer units (e.g., polyethylene is -(CH₂-CH₂)n-) bonded covalently." },
    { q: "What is the difference between a conductor and an insulator?", opts: ["Conductors are always metals; insulators are always plastics","Conductors allow electric current to flow freely; insulators resist the flow of electric current","Conductors resist heat; insulators conduct heat","There is no practical difference at room temperature"], a: 1, exp: "Conductors (copper, aluminum, silver) have loosely bound electrons that flow freely when voltage is applied. Insulators (rubber, glass, plastic) tightly hold their electrons, blocking current flow. This property is fundamental to all electrical wiring and circuits." },
    { q: "What is an alloy?", opts: ["A pure metallic element","A mixture of two or more elements where at least one is a metal, designed for improved properties","A synthetic polymer","A ceramic compound"], a: 1, exp: "Alloys combine metals (and sometimes non-metals) to achieve properties superior to pure metals. Examples: steel (Fe+C), stainless steel (Fe+Cr+Ni), brass (Cu+Zn), bronze (Cu+Sn), aluminum alloys." },
    { q: "What is thermal conductivity?", opts: ["A material's ability to resist temperature changes","The rate at which heat energy transfers through a material (W/m·K)","The temperature at which a material changes phase","Electrical resistance at high temperatures"], a: 1, exp: "Thermal conductivity (k, W/m·K) measures heat transfer rate. Copper (~400 W/m·K) and aluminum (~200) are excellent conductors. Aerogel (~0.015) and air (~0.025) are excellent insulators." },
    { q: "Why are carbon fiber composites valuable in aerospace?", opts: ["They are cheap to manufacture","Their extremely high strength-to-weight ratio — stronger than steel at a fraction of the mass","They are more flexible than steel","They are better electrical conductors than aluminum"], a: 1, exp: "Carbon Fiber Reinforced Polymer (CFRP) has tensile strength exceeding steel at ~1/5 the density. This exceptional strength-to-weight ratio makes it ideal for aerospace, motorsport, and high-performance structures." },
    { q: "What is 'fatigue' in materials science?", opts: ["A material becoming softer at high temperatures","Progressive structural damage occurring when a material is subjected to repeated cyclic loading","The immediate fracture of a brittle material","A material's response to rapid temperature changes"], a: 1, exp: "Material fatigue is progressive, localized structural damage (micro-cracks) caused by cyclic loading, even at stresses well below the ultimate tensile strength. It's responsible for many structural failures, including aircraft components." },
  ],
  cybersecurity: [
    { q: "What is a 'man-in-the-middle' (MitM) attack?", opts: ["A DDoS from multiple sources","An attacker secretly intercepting and potentially altering communications between two parties","Brute-forcing a password","Installing ransomware"], a: 1, exp: "In a MitM attack, the attacker inserts themselves between two communicating parties, secretly reading and possibly modifying data in transit while neither party knows the channel is compromised." },
    { q: "What is SQL injection?", opts: ["Adding records to a database","An attack inserting malicious SQL code into input fields to manipulate a database","A method for speeding up queries","Encrypting database contents"], a: 1, exp: "SQL injection inserts malicious SQL into input fields, tricking the database into executing unintended commands — potentially exposing, modifying, or deleting data. It's consistently in OWASP's Top 10 vulnerabilities." },
    { q: "What does 'encryption at rest' mean?", opts: ["Encrypting data only during transmission","Encrypting data while stored on a device or server","Temporary encryption for cached files","Encrypting data before CPU processing"], a: 1, exp: "Encryption at rest protects stored data (on disk, databases, backups). Even if physical storage is stolen, data remains unreadable without the decryption key. Complements 'encryption in transit' (TLS/HTTPS)." },
    { q: "What is two-factor authentication (2FA)?", opts: ["Using two different passwords","Requiring a second verification factor beyond a password to confirm identity","Sharing access with two administrators","Logging in from two devices simultaneously"], a: 1, exp: "2FA requires two verification factors: something you know (password) + something you have (authenticator app/SMS code) or something you are (biometric). Stolen passwords alone cannot grant access." },
    { q: "What is a 'zero-day vulnerability'?", opts: ["A bug causing startup crashes","A security flaw unknown to the vendor, with zero days available to patch before potential exploitation","A vulnerability effective only for 24 hours","An expired SSL certificate"], a: 1, exp: "A zero-day is an undisclosed vulnerability that developers have had zero days to address. Attackers can exploit it from the moment of discovery, before a patch exists — highly dangerous and valuable on the black market." },
    { q: "What does 'phishing' involve?", opts: ["Scanning networks for open ports","Deceiving users into revealing credentials by impersonating trusted entities","Overloading servers with traffic","Cracking encryption algorithms"], a: 1, exp: "Phishing uses fraudulent emails, texts, or websites impersonating legitimate entities (banks, IT help desks) to steal credentials or install malware. Spear phishing targets specific individuals with personalized deception." },
    { q: "What is the purpose of a VPN (Virtual Private Network)?", opts: ["Speed up internet browsing","Create an encrypted tunnel for internet traffic, masking the user's IP and protecting data on public networks","Block malicious websites automatically","Increase bandwidth on slow connections"], a: 1, exp: "A VPN encrypts all traffic between the user and a VPN server, hiding their IP address and protecting data on untrusted networks (public Wi-Fi). Organizations use VPNs to give remote workers secure access to internal resources." },
  ],
  robotics: [
    { q: "What is machine learning (ML)?", opts: ["Programming computers with explicit rules for every situation","A subset of AI where systems learn patterns from data to improve performance without explicit programming","A method for building physical robots","A type of database management"], a: 1, exp: "ML algorithms learn patterns from training data, improving performance over time without being explicitly programmed for each case. It's the foundation of modern AI: image recognition, NLP, recommendation systems." },
    { q: "What does 'degrees of freedom' (DOF) mean in robotics?", opts: ["The number of sensors on a robot","The number of independent parameters defining a robot's configuration or movement","The maximum payload capacity","The number of supported programming languages"], a: 1, exp: "DOF describes how many independent ways a robot (or rigid body) can move. A door hinge: 1 DOF. Human arm: 7 DOF. More DOF = greater dexterity and flexibility, but more complex control algorithms required." },
    { q: "What does computer vision enable robots to do?", opts: ["Process audio signals faster","Interpret visual information from cameras to identify objects, estimate distances, and navigate environments","Improve battery life","Communicate wirelessly over longer ranges"], a: 1, exp: "Computer vision processes camera imagery to extract actionable information — detecting objects, reading text, estimating depth, recognizing people. It's essential for autonomous navigation, inspection, and manipulation." },
    { q: "What is reinforcement learning?", opts: ["Training AI exclusively on labeled datasets","A type of ML where an agent learns optimal behavior by receiving rewards for desired actions and penalties for undesired ones","Teaching robots through physical demonstration","Storing pre-programmed responses to all scenarios"], a: 1, exp: "Reinforcement learning trains agents through trial-and-error interaction with an environment, maximizing cumulative reward signals. Used in AlphaGo, robotic locomotion, autonomous driving, and game-playing AI." },
    { q: "What are artificial neural networks loosely modeled after?", opts: ["Electrical circuit designs","The structure and function of biological neurons and synapses in the brain","CPU architecture","Internet routing topology"], a: 1, exp: "Artificial neural networks are inspired by biological neural networks. They consist of nodes (neurons) organized in layers (input, hidden, output) with weighted connections that are adjusted during training to learn patterns." },
    { q: "What is 'SLAM' in robotics?", opts: ["A rapid assembly technique for mechanical components","Simultaneous Localization and Mapping — building a map of an unknown environment while tracking the robot's position within it","A type of servo motor control algorithm","A safety protocol for industrial robots"], a: 1, exp: "SLAM (Simultaneous Localization and Mapping) allows robots to construct a map of an unknown environment while simultaneously determining their location within it — essential for autonomous navigation in GPS-denied environments." },
  ],
  history: [
    { q: "Who invented the World Wide Web in 1989?", opts: ["Steve Jobs","Bill Gates","Tim Berners-Lee","Vint Cerf"], a: 2, exp: "Tim Berners-Lee invented the World Wide Web in 1989 at CERN, proposing a system of hypertext documents linked by URLs and accessed via HTTP. He also created the first web browser and server." },
    { q: "What was ENIAC (1945)?", opts: ["The first commercial personal computer","One of the earliest general-purpose electronic digital computers, using ~18,000 vacuum tubes","The first transistor-based computer","The first computer with a hard drive"], a: 1, exp: "ENIAC (Electronic Numerical Integrator and Computer) was one of the earliest general-purpose electronic computers. It weighed 30 tons, occupied 1,800 sq ft, consumed 150kW, and performed ~5,000 additions/second." },
    { q: "What year did the first iPhone launch?", opts: ["2003","2005","2007","2010"], a: 2, exp: "Apple launched the first iPhone on June 29, 2007, combining a phone, widescreen iPod, and internet communicator. It revolutionized mobile computing, spawning the modern smartphone era and the app economy." },
    { q: "What was ARPANET (1969)?", opts: ["The first commercial software company","A US Defense-funded precursor to the internet — the first packet-switched computer network","The first satellite communications system","A mainframe network exclusive to universities"], a: 1, exp: "ARPANET (Advanced Research Projects Agency Network) was the world's first packet-switched network funded by DARPA. It connected research institutions and evolved directly into today's internet." },
    { q: "Who invented the transistor, and when?", opts: ["Thomas Edison, 1910","Nikola Tesla, 1920","Bardeen, Brattain, and Shockley at Bell Labs, 1947","Alan Turing at Cambridge, 1936"], a: 2, exp: "The transistor was invented at Bell Labs in 1947 by John Bardeen, Walter Brattain, and William Shockley (1956 Nobel Prize in Physics). Replacing vacuum tubes, it enabled all of modern electronics." },
    { q: "What did Ada Lovelace contribute to computing in the 1840s?", opts: ["The first programming language manual","An algorithm for Babbage's Analytical Engine — recognized as the first computer program","The blueprint for the first mechanical calculator","A theory of binary arithmetic"], a: 1, exp: "Ada Lovelace wrote an algorithm in 1843 for Babbage's proposed Analytical Engine to compute Bernoulli numbers — considered the first computer program. She also recognized the machine's potential far beyond arithmetic." },
    { q: "When was the first commercial microprocessor, the Intel 4004, released?", opts: ["1965","1971","1979","1984"], a: 1, exp: "Intel released the 4004, the first commercial microprocessor, in 1971. It packed 2,300 transistors on a 4-bit chip and ran at 740 kHz — a revolution that eventually led to the personal computer." },
  ],
};

// ─── App state ────────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id: 'computing',     name: 'Computing & IT',   icon: '💻' },
  { id: 'programming',   name: 'Programming',       icon: '{ }' },
  { id: 'engineering',   name: 'Engineering',       icon: '⚙️' },
  { id: 'electronics',   name: 'Electronics',       icon: '⚡' },
  { id: 'biotech',       name: 'Biotech & Med',     icon: '🧬' },
  { id: 'aerospace',     name: 'Aerospace',         icon: '🚀' },
  { id: 'math',          name: 'Applied Math',      icon: '∑' },
  { id: 'energy',        name: 'Energy & Env.',     icon: '🌱' },
  { id: 'materials',     name: 'Materials Sci.',    icon: '🔬' },
  { id: 'cybersecurity', name: 'Cybersecurity',     icon: '🔐' },
  { id: 'robotics',      name: 'Robotics & AI',     icon: '🤖' },
  { id: 'history',       name: 'Tech History',      icon: '📡' },
];

let selectedCat = 'computing';
let mode = 'single'; // 'single' or 'all'
let stats = { total: 0, correct: 0, wrong: 0, streak: 0 };
let answered = false;
let history = [];
let usedQuestions = {};

// Kick off connectivity check immediately
checkConnectivity();

// Countdown
(function() {
  const target = new Date('2026-04-23T09:00:00');
  const diff = Math.ceil((target - new Date()) / 86400000);
  document.getElementById('days-left').textContent = diff > 0 ? diff : '0';
})();

// Build category grid
const grid = document.getElementById('cat-grid');
CATEGORIES.forEach(cat => {
  const count = QUESTION_BANK[cat.id]?.length || 0;
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat.id === selectedCat ? ' active' : '');
  btn.dataset.id = cat.id;
  btn.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.name}</div><div class="cat-count">${count} questions</div>`;
  btn.onclick = () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCat = cat.id;
  };
  grid.appendChild(btn);
});

function setMode(m) {
  mode = m;
  document.getElementById('mode-single').classList.toggle('active', m === 'single');
  document.getElementById('mode-all').classList.toggle('active', m === 'all');
}

// ─── Local question picker (exhausts all questions before repeating) ──────────
function pickLocalQuestion(catId) {
  const pool = QUESTION_BANK[catId] || [];
  if (!usedQuestions[catId]) usedQuestions[catId] = [];
  let avail = pool.map((_,i) => i).filter(i => !usedQuestions[catId].includes(i));
  if (avail.length === 0) { usedQuestions[catId] = []; avail = pool.map((_,i) => i); }
  const idx = avail[Math.floor(Math.random() * avail.length)];
  usedQuestions[catId].push(idx);
  return { ...pool[idx], catId };
}

function shuffleOptions(q) {
  const indexed = q.opts.map((text, i) => ({ text, correct: i === q.a }));
  for (let i = indexed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indexed[i], indexed[j]] = [indexed[j], indexed[i]];
  }
  const newCorrect = indexed.findIndex(o => o.correct);
  return { ...q, opts: indexed.map(o => o.text), a: newCorrect };
}

// ─── Render a loading skeleton while fetching online ─────────────────────────
function showLoadingCard() {
  document.getElementById('question-area').innerHTML = `
    <div class="q-card" style="opacity:0.5">
      <div class="q-meta">
        <span class="q-cat-tag">🌐 FETCHING ONLINE QUESTION…</span>
      </div>
      <div class="q-text" style="color:var(--muted)">Pulling from Open Trivia Database…</div>
    </div>`;
}

// ─── Main question flow (async to support online fetch) ──────────────────────
async function nextQuestion() {
  if (isFetching) return;    // prevent double-clicks during async load
  isFetching = true;
  answered = false;

  let catId = selectedCat;
  if (mode === 'all') {
    const keys = Object.keys(QUESTION_BANK);
    catId = keys[Math.floor(Math.random() * keys.length)];
  }
  const catObj = CATEGORIES.find(c => c.id === catId);

  document.getElementById('go-btn').disabled = true;
  stats.total++;
  updateStats();

  let q;
  if (isOnline) {
    showLoadingCard();
    const onlineQ = await pickOnlineQuestion(catId);
    if (onlineQ) {
      q = onlineQ;   // already shuffled during OTDB conversion
    } else {
      // Fetch failed — mark offline and fall back to local
      isOnline = false;
      updateSourceChip('offline');
      q = shuffleOptions(pickLocalQuestion(catId));
    }
  } else {
    q = shuffleOptions(pickLocalQuestion(catId));
  }

  isFetching = false;

  const letters = ['A','B','C','D'];
  // Escape the explanation string for safe inline attribute use
  const escExp = q.exp
    .replace(/\\/g,'\\\\')
    .replace(/`/g,"'")
    .replace(/"/g,'&quot;');

  // Badge shown on each card to indicate source
  const sourceBadge = q.source === 'online'
    ? `<span class="q-src-badge online">🌐 OTDB</span>`
    : `<span class="q-src-badge local">📋 LOCAL</span>`;

  const optHTML = q.opts.map((opt, i) => `
    <button class="opt-btn" onclick="checkAnswer(this,${i},${q.a},\`${escExp}\`)" data-idx="${i}">
      <span class="opt-letter">${letters[i]}</span><span>${opt}</span>
    </button>`).join('');

  document.getElementById('question-area').innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-cat-tag">${catObj.icon} ${catObj.name}</span>
        <div style="display:flex;align-items:center;gap:8px">
          ${sourceBadge}
          <span class="q-num">Question ${stats.total}</span>
        </div>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optHTML}</div>
      <div id="exp-area"></div>
    </div>`;
}


function checkAnswer(btn, chosen, correct, exp) {
  if (answered) return;
  answered = true;
  isFetching = false;   // allow next question to proceed
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (parseInt(b.dataset.idx) === correct) b.classList.add('correct');
  });
  const isRight = chosen === correct;
  if (isRight) { stats.correct++; stats.streak++; }
  else { btn.classList.add('wrong'); stats.wrong++; stats.streak = 0; }
  updateStats();
  const letters = ['A','B','C','D'];
  document.getElementById('exp-area').innerHTML = `
    <div class="explanation">
      <strong>${isRight ? '✓ Correct!' : `✗ Incorrect — Answer: ${letters[correct]}`}</strong>${exp}
    </div>
    <button class="next-btn" onclick="nextQuestion()">Next Question →</button>`;
  history.unshift({ icon: isRight ? '✅' : '❌', q: document.querySelector('.q-text').textContent, cat: document.querySelector('.q-cat-tag').textContent.trim() });
  updateHistory();
  document.getElementById('go-btn').disabled = false;
}

function updateStats() {
  document.getElementById('q-count').textContent = stats.total;
  document.getElementById('correct-count').textContent = stats.correct;
  document.getElementById('wrong-count').textContent = stats.wrong;
  document.getElementById('streak-count').textContent = stats.streak;
  const acc = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) + '%' : '—';
  document.getElementById('accuracy').textContent = acc;
  const pct = stats.total > 0 ? (stats.correct / stats.total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function updateHistory() {
  document.getElementById('history-section').style.display = 'block';
  document.getElementById('history-list').innerHTML = history.slice(0, 7).map(h => `
    <div class="history-item">
      <span class="history-icon">${h.icon}</span>
      <span class="history-q">${h.q}</span>
      <span class="history-cat">${h.cat}</span>
    </div>`).join('');
}
</script>
